name: Build desktop apps

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            artifact: OrderAnalytics-Windows
          - os: macos-15
            artifact: OrderAnalytics-macOS-Apple-Silicon
          - os: macos-15-intel
            artifact: OrderAnalytics-macOS-Intel
    runs-on: ${{ matrix.os }}
    defaults:
      run:
        working-directory: OrderAnalyticsDesktopApp

    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true
      - run: uv sync --dev
      - run: uv run python build_desktop.py

      - name: Package Windows app
        if: runner.os == 'Windows'
        shell: pwsh
        run: Compress-Archive -Path dist/OrderAnalytics.exe -DestinationPath dist/OrderAnalytics-Windows.zip

      - name: Package macOS app
        if: runner.os == 'macOS'
        run: ditto -c -k --sequesterRsrc --keepParent dist/OrderAnalytics.app "dist/${{ matrix.artifact }}.zip"

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: OrderAnalyticsDesktopApp/dist/${{ matrix.artifact }}.zip

  release:
    if: startsWith(github.ref, 'refs/tags/')
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true
      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: >-
          gh release create "${GITHUB_REF_NAME}"
          artifacts/OrderAnalytics-Windows.zip
          artifacts/OrderAnalytics-macOS-Apple-Silicon.zip
          artifacts/OrderAnalytics-macOS-Intel.zip
          --repo "${GITHUB_REPOSITORY}"
          --title "Order Analytics ${GITHUB_REF_NAME}"
          --generate-notes
