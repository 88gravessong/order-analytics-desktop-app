name: Build desktop apps

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            artifact: OrderAnalytics-Client-Windows
            build_args: --win --x64
            update_channel: latest
          - os: macos-15
            artifact: OrderAnalytics-Client-macOS-Apple-Silicon
            build_args: --mac --arm64
            update_channel: latest-arm64
          - os: macos-15-intel
            artifact: OrderAnalytics-Client-macOS-Intel
            build_args: --mac --x64
            update_channel: latest-x64
    runs-on: ${{ matrix.os }}
    defaults:
      run:
        working-directory: OrderAnalyticsDesktopApp

    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: OrderAnalyticsDesktopApp/client/package-lock.json
      - run: uv sync --dev
      - run: uv run python build_desktop.py
      - run: npm --prefix client ci
      - run: npm --prefix client run dist -- ${{ matrix.build_args }} --config.publish.channel=${{ matrix.update_channel }}
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: "false"
      - name: Verify macOS app signature
        if: runner.os == 'macOS'
        run: |
          APP_PATH="$(find client-dist -type d -name 'Order Analytics.app' -print -quit)"
          test -n "$APP_PATH"
          codesign --verify --deep --strict --verbose=2 "$APP_PATH"
          codesign --display --verbose=4 "$APP_PATH"

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: |
            OrderAnalyticsDesktopApp/client-dist/*.exe
            OrderAnalyticsDesktopApp/client-dist/*.dmg
            OrderAnalyticsDesktopApp/client-dist/*.zip
            OrderAnalyticsDesktopApp/client-dist/*.yml
            OrderAnalyticsDesktopApp/client-dist/*.blockmap

  release:
    if: startsWith(github.ref, 'refs/tags/')
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true
      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${GITHUB_REF_NAME}" artifacts/* \
            --repo "${GITHUB_REPOSITORY}" \
            --title "Order Analytics Client ${GITHUB_REF_NAME}" \
            --generate-notes
